<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniSearcher</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ── HERO ── -->
    <section class="hero is-info is-small">
        <div class="hero-body">
            <div class="container has-text-centered">
                <p class="title">
                    <span class="shimmer">📚 AniSearcher</span>
                </p>
                <p class="subtitle">
                    搜尋你喜愛的動畫
                </p>
            </div>
        </div>
    </section>
 
    <!-- ── SEARCH ── -->
    <section class="section">
        <div class="container">
            <div class="box">
                <div class="field has-addons">
                    <div class="control is-expanded">
                        <input class="input is-large" type="text" id="search-keyword" placeholder="輸入你想找的動畫名稱...">
                    </div>
                    <div class="control">
                        <button class="button is-info is-large" id="search-btn">
                            🔍 搜尋
                        </button>
                    </div>
                </div>
            </div>
 
            <!-- ── RESULTS ── -->
            <div class="box">
                <p class="subtitle has-text-centered">搜尋結果</p>
                <div class="columns is-multiline" id="search-results">
                    <div class="column has-text-centered has-text-grey-light">
                        (點擊搜尋按鈕後，結果將顯示於此)
                    </div>
                </div>
            </div>
        </div>
    </section>
 
    <!-- ── MODAL ── -->
    <div class="modal" id="details-modal">
        <div class="modal-background" id="modal-bg"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title has-text-weight-bold" id="modal-title">載入中...</p>
                <button class="delete" aria-label="close" id="modal-close-btn"></button>
            </header>
            <section class="modal-card-body">
                <div id="modal-content" class="content is-medium"></div>
            </section>
            <footer class="modal-card-foot">
                <button class="button is-info" id="modal-ok-btn">關閉視窗</button>
            </footer>
        </div>
    </div>
 
    <!-- ── FOOTER ── -->
    <footer class="footer">
        AniSearcher &nbsp;·&nbsp; Powered by Jikan API &nbsp;·&nbsp; Built with FastAPI
    </footer>
 
    <script src="/static/app.js"></script>
</body>
</html>
